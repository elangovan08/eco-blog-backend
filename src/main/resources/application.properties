spring.application.name=ecoblog-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
# MySQL Configuration
#//spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/blogdb?useSSL=false}
#
#
#spring.datasource.username=${DB_USERNAME:root}
#spring.datasource.password=${DB_PASSWORD:Test123$}
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/blogdb}

spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Test123$}

spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

